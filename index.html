<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewRapMusic — Эпоха Hip-Hop.ru</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <div class="bg-overlay"></div>

    <!-- ЭКРАН 1: Вход на форум -->
    <section id="welcome-screen" class="screen active">
        <div class="welcome-container">
            <h1 class="logo">NewRap<span>Music</span></h1>
            <div class="forum-tag">BATTLE_ZONE // HIP-HOP.RU ВАЙБ</div>
            <p class="subtitle">Угадай МС золотой эпохи интернет-баттлов нулевых по треку, теме раунда или архивной фотографии.</p>
            <button id="start-btn" class="btn-primary">Пройти в Раунд 1</button>
        </div>
    </section>

    <!-- ЭКРАН 2: Судейство (Игровой процесс) -->
    <section id="game-screen" class="screen">
        <div class="game-header">
            <div class="logo-mini">NewRap<span>Music</span></div>
            <div class="score-board">Респект: <span id="score">0</span></div>
        </div>

        <div class="game-container">
            <!-- Карточка раунда -->
            <div class="battle-card">
                <div class="image-wrapper">
                    <img id="mc-photo" src="" alt="Фото / Аватар МС">
                </div>
                
                <!-- Аудио-плеер для баттлового трека -->
                <div class="audio-block">
                    <div class="audio-title">🔊 Слушать баттловый парт (MP3, 128kbps):</div>
                    <audio id="battle-audio" controls src=""></audio>
                </div>
            </div>

            <!-- Поле ввода с автокомплитом -->
            <div class="controls-wrapper">
                <div class="input-group">
                    <input type="text" id="artist-input" placeholder="Никнейм МС с форума..." autocomplete="off">
                    <div id="autocomplete-list" class="autocomplete-suggestions"></div>
                </div>
                <button id="submit-btn" class="btn-primary">Сдать судейский голос</button>
            </div>

            <!-- Подсказки в духе ХХРУ -->
            <div class="hints-container">
                <button id="hint-track" class="btn-secondary">📝 Тема раунда</button>
                <button id="hint-year" class="btn-secondary">🏆 Какой это был баттл?</button>
            </div>
            <div id="hint-text" class="hint-display"></div>
        </div>
    </section>

    <!-- ЭКРАН 3: Таблица результатов -->
    <section id="game-over-screen" class="screen">
        <div class="game-over-container">
            <h2 class="title-ended">БАТТЛ ОКОНЧЕН</h2>
            <p class="final-score">Твои очки судейства: <span id="final-score-val">0</span></p>
            <button id="restart-btn" class="btn-primary">Зайти под другим аккаунтом</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
