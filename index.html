<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewRapMusic — Соцсеть-Форум Андеграунда</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@400;600;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <!-- Главная общая сетка приложения -->
    <div class="app-container">
        
        <!-- ЛЕВАЯ ПАНЕЛЬ: Профиль и Статистика -->
        <aside class="sidebar">
            <div class="main-logo">NewRap<span>Music</span></div>
            <div class="profile-card">
                <div class="user-avatar-zone">
                    <img id="my-avatar" src="https://unsplash.com" alt="Мой аватар">
                </div>
                <div class="user-info">
                    <h3 id="my-nickname">Рэпер_ХХРУ</h3>
                    <span class="user-status">Статус: Андеграунд МС</span>
                </div>
            </div>
            
            <div class="stats-box">
                <div class="stat-line">🔥 Респект: <span id="stat-respect">150</span></div>
                <div class="stat-line">💿 Треков: <span id="stat-tracks">0</span></div>
                <div class="stat-line">⚔️ Баттлов: <span id="stat-battles">0</span></div>
            </div>

            <nav class="sidebar-menu">
                <button class="menu-btn active" onclick="switchSection('feed')">📰 Лента форума</button>
                <button class="menu-btn studio" onclick="switchSection('studio')">🎤 Студия записей</button>
            </nav>
        </aside>

        <!-- ЦЕНТРАЛЬНЫЙ ХАБ: Контентная зона -->
        <main class="content-hub">
            
            <!-- СЕКЦИЯ 1: ЛЕНТА ФОРУМА (АКТИВНАЯ ПО УМОЛЧАНИЮ) -->
            <section id="section-feed" class="forum-section active">
                <div class="section-title-strip">ПОСЛЕДНЯЯ АКТИВНОСТЬ В КОМЬЮНИТИ</div>
                <div id="forum-threads-list" class="threads-container">
                    <!-- Сюда JS генерирует треки, фиты, баттлы и тексты -->
                </div>
            </section>

            <!-- СЕКЦИЯ 2: СТУДИЯ ЗАПИСЕЙ И ДРОПОВ -->
            <section id="section-studio" class="forum-section">
                <div class="section-title-strip">СОЗДАТЬ НОВЫЙ РЕЛИЗ / ВЫЗОВ НА БАТТЛ</div>
                
                <div class="studio-form-box">
                    <div class="form-group">
                        <label>1. Выберите тип публикации:</label>
                        <div class="type-selectors">
                            <button class="type-tab active" data-type="solo" onclick="selectPostType('solo')">Сольный трек</button>
                            <button class="type-tab" data-type="fit" onclick="selectPostType('fit')">Сделать Фит (Коллаб)</button>
                            <button class="type-tab" data-type="battle" onclick="selectPostType('battle')">Запустить Баттл (1v1)</button>
                            <button class="type-tab" data-type="text" onclick="selectPostType('text')">Просто текст (ТХТ-рэп)</button>
                        </div>
                    </div>

                    <!-- Динамический блок выбора бита (Скрывается для текстовых) -->
                    <div class="form-group" id="beat-selection-group">
                        <label>2. Музыкальная подложка (Бит):</label>
                        <select id="beat-select">
                            <option value="own">Загрузить свой личный минус (.mp3)</option>
                            <option value="none">Без бита (Акапелла андеграунда)</option>
                            <option value="community_classic">Классический баттловый минус (Из комьюнити)</option>
                            <option value="community_dirty">Грязный олдскульный бум-бэп (Из комьюнити)</option>
                        </select>
                    </div>

                    <!-- Динамический блок для Фитов (Скрыт по умолчанию) -->
                    <div class="form-group hidden" id="fit-partner-group">
                        <label>Пригласить МС на фит:</label>
                        <select id="partner-select">
                            <option value="Oxxxymiron">Oxxxymiron (Лондон)</option>
                            <option value="Babangida">Babangida (Калининград)</option>
                            <option value="Noize MC">Noize MC (Москва)</option>
                            <option value="СД">СД (What's Up Crew)</option>
                        </select>
                    </div>

                    <!-- Поля ввода контента -->
                    <div class="form-group">
                        <label>Заголовок релиза или тема баттла:</label>
                        <input type="text" id="post-title-input" placeholder="Например: Раунд 3 — В стране женщин или Дисc на оппонента...">
                    </div>

                    <div class="form-group">
                        <label>Текст трека / Рифмы / Описание:</label>
                        <textarea id="post-text-input" rows="6" placeholder="Запиши свои панчи или текст трека сюда..."></textarea>
                    </div>

                    <button class="publish-btn" onclick="publishRelease()">ОПУБЛИКОВАТЬ НА ХИП-ХОП.РУ</button>
                </div>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
