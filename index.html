<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewRapMusic — Соцсеть-Форум Андеграунда</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@400;600;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cloudflare.com"></script>
    <style>
        :root {
            --bg-main: #080808;
            --bg-side: #111111;
            --bg-card: #161616;
            --orange: #FF6A00;
            --border: #222222;
            --text: #EAEAEA;
            --muted: #6C6C6C;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: var(--bg-main);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
            max-width: 1300px;
            margin: 0 auto;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            background: var(--bg-main);
        }

        .sidebar {
            background: var(--bg-side);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .main-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        .main-logo span { color: var(--orange); }

        .profile-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .user-avatar-zone {
            width: 55px; height: 55px;
            border-radius: 2px; overflow: hidden;
            border: 1px solid var(--orange);
        }
        .user-avatar-zone img { width: 100%; height: 100%; object-fit: cover; }
        .user-info h3 { font-size: 0.9rem; font-weight: 800; margin-bottom: 3px; }
        .user-status { font-size: 0.7rem; color: var(--muted); }

        .stats-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(255,106,0,0.03);
            padding: 15px;
            border-left: 3px solid var(--orange);
        }
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .menu-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px;
            text-align: left;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .menu-btn.active, .menu-btn:hover {
            background: var(--orange);
            color: #000;
            border-color: var(--orange);
        }
        .menu-btn.studio { border-style: dashed; border-color: var(--orange); color: var(--orange); }
        .menu-btn.studio.active, .menu-btn.studio:hover { color: #000; background: var(--orange); }

        .content-hub {
            padding: 30px;
            background: var(--bg-main);
        }

        .forum-section {
            display: none;
            flex-direction: column;
            gap: 20px;
        }
        .forum-section.active { display: flex; }

        .section-title-strip {
            background: #141414;
            padding: 12px 18px;
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--orange);
            color: var(--muted);
        }

        .threads-container { display: flex; flex-direction: column; gap: 20px; }

        .forum-post {
            background: var(--bg-side);
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }

        .post-header {
            background: #121212;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .badge-type {
            font-size: 0.65rem; font-weight: 900; background: var(--orange); color: #000;
            padding: 3px 8px; border-radius: 2px; text-transform: uppercase;
        }
        .post-author { font-size: 0.85rem; font-weight: 700; }

        .post-body { padding: 20px; }
        .post-title { font-size: 1.15rem; font-weight: 800; margin-bottom: 10px; color: #FFF; }
        .post-text { font-size: 0.9rem; line-height: 1.6; color: #BBB; margin-bottom: 15px; white-space: pre-line; }

        .player-container {
            background: #181818;
            padding: 15px;
            border: 1px solid var(--border);
            margin-top: 15px;
        }
        .beat-source-tag { font-size: 0.7rem; color: var(--orange); font-weight: 700; display: block; margin-bottom: 8px; }
        audio { width: 100%; filter: invert(1) hue-rotate(180deg); }

        .post-footer-actions {
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            gap: 15px;
            background: #0E0E0E;
        }
        .action-link { font-size: 0.8rem; font-weight: 700; color: var(--muted); cursor: pointer; background:none; border:none;}
        .action-link:hover { color: var(--orange); }

        .studio-form-box {
            background: var(--bg-side);
            border: 1px solid var(--border);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.85rem; font-weight: 700; color: var(--muted); }

        .type-selectors { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .type-tab {
            background: #141414; border: 1px solid var(--border); color: #FFF;
            padding: 12px; font-size: 0.8rem; font-weight: 700; cursor: pointer;
        }
        .type-tab.active { border-color: var(--orange); color: var(--orange); background: rgba(255,106,0,0.05); }

        select, input[type="text"], textarea {
            background: var(--bg-main); border: 1px solid var(--border);
            color: #FFF; padding: 14px; font-size: 0.95rem; outline: none; width: 100%;
        }
        select:focus, input:focus, textarea:focus { border-color: var(--orange); }

        .publish-btn {
            background: var(--orange); color: #000; border: none; font-weight: 900;
            font-size: 0.9rem; padding: 16px; cursor: pointer; letter-spacing: 1px;
        }
        .publish-btn:hover { background: #FFF; }

        .hidden { display: none !important; }

        @media(max-width: 900px) {
            .app-container { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="main-logo">NewRap<span>Music</span></div>
            <div class="profile-card">
                <div class="user-avatar-zone">
                    <img id="my-avatar" src="https://unsplash.com" alt="Мой аватар">
                </div>
                <div class="user-info">
                    <h3 id="my-nickname">Рэпер_ХХРУ</h3>
                    <span class="user-status">Статус: Андеграунд МС</span>
                </div>
            </div>
            
            <div class="stats-box">
                <div class="stat-line">🔥 Респект: <span id="stat-respect">150</span></div>
                <div class="stat-line">💿 Треков: <span id="stat-tracks">0</span></div>
                <div class="stat-line">⚔️ Баттлов: <span id="stat-battles">0</span></div>
            </div>

            <nav class="sidebar-menu">
                <button class="menu-btn active" onclick="switchSection('feed')">📰 Лента форума</button>
                <button class="menu-btn studio" onclick="switchSection('studio')">🎤 Студия записей</button>
            </nav>
        </aside>
        <main class="content-hub">
            
            <section id="section-feed" class="forum-section active">
                <div class="section-title-strip">ПОСЛЕДНЯЯ АКТИВНОСТЬ В КОМЬЮНИТИ</div>
                <div id="forum-threads-list" class="threads-container"></div>
            </section>

            <section id="section-studio" class="forum-section">
                <div class="section-title-strip">СОЗДАТЬ НОВЫЙ РЕЛИЗ / ВЫЗОВ НА БАТТЛ</div>
                
                <div class="studio-form-box">
                    <div class="form-group">
                        <label>1. Выберите тип публикации:</label>
                        <div class="type-selectors">
                            <button class="type-tab active" data-type="solo" onclick="selectPostType('solo')">Сольный трек</button>
                            <button class="type-tab" data-type="fit" onclick="selectPostType('fit')">Сделать Фит (Коллаб)</button>
                            <button class="type-tab" data-type="battle" onclick="selectPostType('battle')">Запустить Баттл (1v1)</button>
                            <button class="type-tab" data-type="text" onclick="selectPostType('text')">Просто текст (ТХТ-рэп)</button>
                        </div>
                    </div>

                    <div class="form-group" id="beat-selection-group">
                        <label>2. Музыкальная подложка (Бит):</label>
                        <select id="beat-select">
                            <option value="own">Загрузить свой личный минус (.mp3)</option>
                            <option value="none">Без бита (Акапелла андеграунда)</option>
                            <option value="community_classic">Классический баттловый минус (Из комьюнити)</option>
                            <option value="community_dirty">Грязный олдскульный бум-бэп (Из комьюнити)</option>
                        </select>
                    </div>

                    <div class="form-group hidden" id="fit-partner-group">
                        <label>Пригласить МС на фит:</label>
                        <select id="partner-select">
                            <option value="Oxxxymiron">Oxxxymiron (Лондон)</option>
                            <option value="Babangida">Babangida (Калининград)</option>
                            <option value="Noize MC">Noize MC (Москва)</option>
                            <option value="СД">СД (What's Up Crew)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Заголовок релиза или тема баттла:</label>
                        <input type="text" id="post-title-input" placeholder="Например: Раунд 3 — В стране женщин или Дисc на оппонента...">
                    </div>

                    <div class="form-group">
                        <label>Текст трека / Рифмы / Описание:</label>
                        <textarea id="post-text-input" rows="6" placeholder="Запиши свои панчи или текст трека сюда..."></textarea>
                    </div>

                    <button class="publish-btn" onclick="publishRelease()">ОПУБЛИКОВАТЬ НА ХИП-ХОП.РУ</button>
                </div>
            </section>

        </main>
    </div>

    <script>
        let forumThreads = [
            {
                id: 1,
                type: "battle",
                author: "Oxxxymiron",
                title: "Раунд 3: В стране женщин (Официальный баттл)",
                text: "Йети копает корни в тени ветвей, андеграунд восстает. Слушайте судейский сданый трек на оригинальный минус.",
                beatType: "community_classic",
                audio: "https://soundhelix.com",
                respect: 412,
                voted: false
            },
            {
                id: 2,
                type: "fit",
                author: "Babangida & СД",
                title: "Эксклюзивный Фирменный Сплит-Дроп",
                text: "Записали совместный фит на грязный бит из комьюнити. Всем хейтерам и любителям поп-рэпа посвящается.",
                beatType: "community_dirty",
                audio: "https://soundhelix.com",
                respect: 289,
                voted: false
            },
            {
                id: 3,
                type: "text",
                author: "Noize_MC",
                title: "Фристайл на лавке возле метро [ТХТ-версия]",
                text: "Панельные дома, дворы, разбитые витрины,\nМы пишем этот рэп без дорогой студии и грима.\nСтроки ложатся на экран, заценивайте рифмоконструкции в комментариях.",
                beatType: "none",
                audio: "",
                respect: 195,
                voted: false
            }
        ];

        let selectedPostType = "solo";
        let myTracksCount = 0;
        let myBattlesCount = 0;
        let myRespect = 150;

        document.addEventListener("DOMContentLoaded", () => {
            renderForumThreads();
        });

        function switchSection(sectionName) {
            document.querySelectorAll('.forum-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(`section-${sectionName}`).classList.add('active');
            if(event) {
                event.target.classList.add('active');
            }
            
            gsap.fromTo(`#section-${sectionName}`, {opacity: 0, y: 10}, {opacity: 1, y: 0, duration: 0.3});
        }

        function selectPostType(type) {
            selectedPostType = type;
            document.querySelectorAll('.type-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelector(`[data-type="${type}"]`).classList.add('active');

            const beatGroup = document.getElementById('beat-selection-group');
            const fitGroup = document.getElementById('fit-partner-group');

            if (type === 'text') {
                beatGroup.classList.add('hidden');
                fitGroup.classList.add('hidden');
            } else if (type === 'fit') {
                beatGroup.classList.remove('hidden');
                fitGroup.classList.remove('hidden');
            } else {
                beatGroup.classList.remove('hidden');
                fitGroup.classList.add('hidden');
            }
        }

        function renderForumThreads() {
            const listContainer = document.getElementById('forum-threads-list');
            listContainer.innerHTML = "";

            forumThreads.forEach(thread => {
                const postElement = document.createElement('article');
                postElement.classList.add('forum-post');
                
                let audioHTML = "";
                if (thread.type !== 'text' && thread.audio) {
                    let beatLabel = "Личный бит исполнителя";
                    if (thread.beatType === 'community_classic') beatLabel = "Классический баттловый минус ХХРУ";
                    if (thread.beatType === 'community_dirty') beatLabel = "Грязный олдскульный Бум-Бэп минус";
                    if (thread.beatType === 'none') beatLabel = "Акапелла (Без бита)";

                    audioHTML = `
                        <div class="player-container">
                            <span class="beat-source-tag">🔊 Музыка: ${beatLabel}</span>
                            <audio controls src="${thread.audio}"></audio>
                        </div>
                    `;
                }

                postElement.innerHTML = `
                    <div class="post-header">
                        <span class="post-author">👤 Автор: <strong>${thread.author}</strong></span>
                        <span class="badge-type">${getPostTypeLabel(thread.type)}</span>
                    </div>
                    <div class="post-body">
                        <h2 class="post-title">${thread.title}</h2>
                        <p class="post-text">${thread.text}</p>
                        ${audioHTML}
                    </div>
                    <div class="post-footer-actions">
                        <button class="action-link" onclick="addRespect(${thread.id})">👍 Выразить Респект (<span id="resp-count-${thread.id}">${thread.respect}</span>)</button>
                        <button class="action-link" onclick="alert('Окно комментариев находится в разработке по правилам vBulletin.')">💬 Комментировать</button>
                    </div>
                `;
                listContainer.appendChild(postElement);
            });
        }

        function getPostTypeLabel(type) {
            if (type === 'solo') return "Соло Релиз";
            if (type === 'fit') return "ФИТ / КОЛЛАБ";
            if (type === 'battle') return "БАТТЛ 1v1";
            if (type === 'text') return "ТХТ РЭП";
            return "Пост";
        }

        function addRespect(id) {
            const thread = forumThreads.find(t => t.id === id);
            if (thread && !thread.voted) {
                thread.respect += 1;
                thread.voted = true;
                document.getElementById(`resp-count-${id}`).textContent = thread.respect;
                
                gsap.fromTo(`#resp-count-${id}`, {scale: 1.3, color: '#FF6A00'}, {scale: 1, color: '#FFFFFF', duration: 0.3});
            }
        }

        function publishRelease() {
            const titleInput = document.getElementById('post-title-input');
            const textInput = document.getElementById('post-text-input');
            const beatSelect = document.getElementById('beat-select');
            const partnerSelect = document.getElementById('partner-select');

            if (!titleInput.value.trim() || !textInput.value.trim()) {
                alert("Заполните заголовок темы и текст вашего парта!");
                return;
            }

            let authorName = "Рэпер_ХХРУ";
            if (selectedPostType === 'fit') {
                authorName += ` & ${partnerSelect.value}`;
            }

            let assignedAudio = "https://soundhelix.com";
            if (beatSelect.value === 'none') assignedAudio = "";
            if (beatSelect.value === 'community_dirty') assignedAudio = "https://soundhelix.com";

            const newPost = {
                id: forumThreads.length + 1,
                type: selectedPostType,
                author: authorName,
                title: titleInput.value,
                text: textInput.value,
                beatType: selectedPostType === 'text' ? 'none' : beatSelect.value,
                audio: assignedAudio,
                respect: 1,
                voted: false
            };

            forumThreads.unshift(newPost);

            if (selectedPostType === 'battle') myBattlesCount++;
            if (selectedPostType === 'solo' || selectedPostType === 'fit') myTracksCount++;
            myRespect += 10;

            document.getElementById('stat-tracks').textContent = myTracksCount;
            document.getElementById('stat-battles').textContent = myBattlesCount;
            document.getElementById('stat-respect').textContent = myRespect;

            titleInput.value = "";
            textInput.value = "";

            switchSection('feed');
            renderForumThreads();
        }
    </script>
</body>
</html>
